name: Build docker qt6 image

on:
  workflow_dispatch:
env:
  QT_VER: 6.8
  DOCKER_USER: streetpea
jobs:
  build-qt6-image_x64:
    name: Build qt6 image x64
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Podman
        run: |
          sudo apt update
          sudo apt-get -y install podman

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: 'qt6-docker'

      - name: Run build script
        working-directory: qt6-docker
        run: |
          set -xe
          podman build -t docker.io/${{ env.DOCKER_USER }}/qt6:${{ env.QT_VER }}-gcc-aqt-$(uname -m) \
          -f ${{ env.QT_VER }}-gcc-aqt/Dockerfile-$(uname -m) \
          ${{ env.QT_VER }}-gcc-aqt

      - name: Login to podman repo
        run: |
          echo ${{ secrets.DOCKERTOKEN }} |  podman login docker.io -u ${{ env.DOCKER_USER }} --password-stdin

      - name: Push build
        run: |
          set -xe
          podman push docker.io/${{ env.DOCKER_USER }}/qt6:${{ env.QT_VER }}-gcc-aqt-$(uname -m)

  build-qt6-image_arm64:
    name: Build qt6 image arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Setup Podman
        run: |
          sudo apt update
          sudo apt-get -y install podman

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: 'qt6-docker'

      - name: Run build script
        working-directory: qt6-docker
        run: |
          set -xe
          podman build -t docker.io/${{ env.DOCKER_USER }}/qt6:${{ env.QT_VER }}-gcc-aqt-$(uname -m) \
          -f ${{ env.QT_VER }}-gcc-aqt/Dockerfile-$(uname -m) \
          ${{ env.QT_VER }}-gcc-aqt

      - name: Login to podman repo
        run: |
          echo ${{ secrets.DOCKERTOKEN }} |  podman login docker.io -u ${{ env.DOCKER_USER }} --password-stdin

      - name: Push build
        run: |
          set -xe
          podman push docker.io/${{ env.DOCKER_USER }}/qt6:${{ env.QT_VER }}-gcc-aqt-$(uname -m)

  build-qt6-multiarch:
    name: Build qt6 image multiarch
    runs-on: ubuntu-latest
    needs: 
      - build-qt6-image_x64
      - build-qt6-image_arm64
    steps:
      - name: Setup Podman
        run: |
          sudo apt update
          sudo apt-get -y install podman

      - name: Create manifest
        run: |
          set -xe
          podman manifest create docker.io/${{ env.DOCKER_USER }}/qt6:${{ env.QT_VER }}-gcc-aqt \
          docker.io/${{ env.DOCKER_USER }}/qt6:${{ env.QT_VER }}-gcc-aqt-aarch64 \
          docker.io/${{ env.DOCKER_USER }}/qt6:${{ env.QT_VER }}-gcc-aqt-x86_64

      - name: Login to podman repo
        run: |
          echo ${{ secrets.DOCKERTOKEN }} |  podman login docker.io -u ${{ env.DOCKER_USER }} --password-stdin

      - name: Push build
        run: |
          set -xe
          podman push docker.io/${{ env.DOCKER_USER }}/qt6:${{ env.QT_VER }}-gcc-aqt
