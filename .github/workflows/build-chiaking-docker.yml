name: Build chiaki-ng builder image

on:
  workflow_dispatch:
    inputs:
      QT_VER:
        description: 'QT version'
        required: true
        default: '6.9'
        type: choice
        options:
          - 6.9
          - 6.8
env:
  QT_VER: ${{ inputs.QT_VER }}
  DOCKER_USER: streetpea
jobs:
  build-chiaking-image_x64:
    name: Build chiaki-ng image x64
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Podman
        run: |
          sudo apt update
          sudo apt-get -y install podman

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: 'qt6-docker'

      - name: Run build script
        working-directory: qt6-docker
        run: |
          set -xe
          podman build -t docker.io/${{ env.DOCKER_USER }}/chiaki-ng-builder:qt${{ env.QT_VER }}-$(uname -m) \
          -f chiaki-ng-docker/Dockerfile.qt6 \
          chiaki-ng-docker

      - name: Login to podman repo
        run: |
          echo ${{ secrets.DOCKERTOKEN }} |  podman login docker.io -u ${{ env.DOCKER_USER }} --password-stdin

      - name: Push build
        run: |
          set -xe
          podman push docker.io/${{ env.DOCKER_USER }}/chiaki-ng-builder:qt${{ env.QT_VER }}-$(uname -m)

  build-chiaking-image_arm64:
    name: Build chiaki-ng image arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Setup Podman
        run: |
          sudo apt update
          sudo apt-get -y install podman

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: 'qt6-docker'

      - name: Run build script
        working-directory: qt6-docker
        run: |
          set -xe
          podman build -t docker.io/${{ env.DOCKER_USER }}/chiaki-ng-builder:qt${{ env.QT_VER }}-$(uname -m) \
          -f chiaki-ng-docker/Dockerfile.qt6 \
          chiaki-ng-docker

      - name: Login to podman repo
        run: |
          echo ${{ secrets.DOCKERTOKEN }} |  podman login docker.io -u ${{ env.DOCKER_USER }} --password-stdin

      - name: Push build
        run: |
          set -xe
          podman push docker.io/${{ env.DOCKER_USER }}/chiaki-ng-builder:qt${{ env.QT_VER }}-$(uname -m)

  build-chiaking-multiarch:
    name: Build chiaki-ng image multiarch
    runs-on: ubuntu-latest
    needs: 
      - build-chiaking-image_x64
      - build-chiaking-image_arm64
    steps:
      - name: Setup Podman
        run: |
          sudo apt update
          sudo apt-get -y install podman

      - name: Create manifest
        run: |
          set -xe
          podman manifest create docker.io/${{ env.DOCKER_USER }}/chiaki-ng-builder:qt${{ env.QT_VER }} \
          docker.io/${{ env.DOCKER_USER }}/chiaki-ng-builder:qt${{ env.QT_VER }}-aarch64 \
          docker.io/${{ env.DOCKER_USER }}/chiaki-ng-builder:qt${{ env.QT_VER }}-x86_64

      - name: Login to podman repo
        run: |
          echo ${{ secrets.DOCKERTOKEN }} |  podman login docker.io -u ${{ env.DOCKER_USER }} --password-stdin

      - name: Push build
        run: |
          set -xe
          podman push docker.io/${{ env.DOCKER_USER }}/chiaki-ng-builder:qt${{ env.QT_VER }}
